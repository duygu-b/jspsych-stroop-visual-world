        //Fonctions
        function checkAccuracy(final_locations, correct_image, target_image) {
            const obj = final_locations.find(o => o.src.includes(correct_image));
            const target = final_locations.find(o => o.src.includes(target_image));

            if (!obj || !target) {
                return 0;
            }

            const objLeft   = obj.x;
            const objRight  = obj.x + 100;
            const objTop    = obj.y;
            const objBottom = obj.y + 100;

            const targetLeft   = target.x;
            const targetRight  = target.x + 100;
            const targetTop    = target.y;
            const targetBottom = target.y + 100;

            const overlaps =
                objRight  >= targetLeft  &&
                objLeft   <= targetRight &&
                objBottom >= targetTop   &&
                objTop    <= targetBottom;

                if (overlaps) {
                    return 1;
                } else {
                return 0;
            }
        }
        function getFilenameFromSrc(src) {
            return src.split("/").pop().split("?")[0];
        }
        function getCurrentROIs() {
            const container = document.querySelector("#jspsych-content") || document;
            const imgs = Array.from(container.querySelectorAll("img"));
              return imgs.map(img => {
            const r = img.getBoundingClientRect(); // viewport koordinatları
                return {
                label: getFilenameFromSrc(img.src),
                left: r.left,
                right: r.right,
                top: r.top,
                bottom: r.bottom
                };
            });
        }
        function whichROI(x, y, rois) {
            for (const roi of rois) {
                if (x >= roi.left && x <= roi.right && y >= roi.top && y <= roi.bottom) {
                    return roi.label;
                }
            }
            return "background";
        }
        function updateValidationUI() {
            const status = document.getElementById('status-text');
            const dot = document.getElementById('target-dot');
            const instr = document.getElementById('instruction-text');
            
            if (status) {
                status.innerText = "System Ready";
                status.style.color = "green";
                dot.style.opacity = "1";
                instr.style.visibility = "visible";
            }

        function calculateValidationError(gazeData) {
            if (!gazeData) return null;

            // purple dot for validation
            const targetX = window.innerWidth / 2;
            const targetY = window.innerHeight / 2;

            const dx = gazeData.x - targetX;
            const dy = gazeData.y - targetY;

            return Math.sqrt(dx * dx + dy * dy); // pixel error
        }

        function congruent() {
            const c = jsPsych.randomization.sampleWithReplacement(colours, 1)[0];

        function incongruent() {

            const colourMap = { red: 0, green: 1, blue: 2 };

                if (window.tempGazeSamples.length > 0) {
                    const avgX = window.tempGazeSamples.reduce((s, a) => s + a.x, 0) / window.tempGazeSamples.length;

                    const targetY = window.innerHeight / 2;
                    
                    // Euclidian distance formula

                } else {

                }

                document.head.appendChild(style);

                const area = document.querySelector('.jspsych-free-sort-area');

                // 2. voice check

                window.currentAudio = new Audio(audioPath);

                // Trial start time
                window.trialStartGlobal = performance.now();

                // playback time
                window.currentAudio.addEventListener("playing", function() {
                    window.audioStartGlobal = performance.now();
                });

                window.currentAudio.onended = function() {
                    const cursorStyle = document.getElementById('hide-cursor');
                    if (cursorStyle) cursorStyle.remove(); // after audio, show mouse cursor
                    if(area) area.style.pointerEvents = 'auto';
                };

                //300ms delay for audio
                setTimeout(() => {
                    window.currentAudio.play();
                }, 300);

                window.currentAudio.play();

                // 3. Mouse Trajectory
                window.mouse_trajectory = [];
                window.mouseListener = (e) => {
                    window.mouse_trajectory.push({x: e.clientX, y: e.clientY, t: performance.now()});
                };
                document.addEventListener('mousemove', window.mouseListener);

                // 4. WebGazer ROI counts
                window.roi_counts = { background: 0 };

                // ROI transitions/sequence
                window.roi_transitions = [];
                window.last_roi = null;
                // WebGazer listener
                webgazer.setGazeListener((g, time) => {
                    if (!g) return;

                    const x = g.x;
                    const y = g.y;

                    // Because the objects can move, we get the latest ROI boxes for each sample
                    const rois = getCurrentROIs();
                    const hit = whichROI(x, y, rois);

                    // counts
                    window.roi_counts[hit] = (window.roi_counts[hit] || 0) + 1;

                    // transitions
                    if (hit !== window.last_roi) {
                    window.roi_transitions.push({ roi: hit, t: time });
                    window.last_roi = hit;
                    }
                });

            }, 
            on_finish: function (data){
                document.removeEventListener('mousemove', window.mouseListener);
                document.body.style.cursor = 'auto';
                data.mouse_trajectory = window.mouse_trajectory;
                data.roi_counts = window.roi_counts;
                data.roi_transitions = window.roi_transitions;

                if (data.condition === "ambiguous" || data.condition === "unambiguous" || data.condition === "filler" || data.condition === "practice") {

                images: ["images/desk.png", "images/flower.png", "images/clock.png", "images/apple.png"],
                audio: "audio/practice.wav"
            }
        ];

        const timestamp = Date.now();

        // 1. Önce kategorilere ayır
        const amb = sentences.filter(s => s.condition === "ambiguous");
        const unamb = sentences.filter(s => s.condition === "unambiguous");
        const filler = sentences.filter(s => s.condition === "filler");
        const practice_sent = sentences.find(s => s.condition === "practice");
        
        function makeVWBlock(sentence) {
            return [{
                timeline: [fixation_vw, drag_drop],
                timeline_variables: [sentence] 
            }];
        }

        const feedback_vw = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: function () {
                const last_trial = jsPsych.data.get().filter({trial_type: 'free-sort'}).last(1).values()[0];

                if (last_trial && last_trial.accuracy === 1) {
                    return '<p style="color:green; font-size:24px;">Correct!</p>';
                } 
                else {
                    return '<p style="color:red; font-size:24px;">Incorrect! Try again.</p>';
                }
            },
            choices: "NO_KEYS",
            trial_duration: 900
        };
        function repeatTillCorrectDragDrop(values) {
            return {
                timeline: [
                    fixation_vw, 
                    {
                        timeline: [drag_drop],
                        timeline_variables: [values]
                    },
                    feedback_vw
                ],
                loop_function: function(data) {
                    var last_trial = data.filter({trial_type: 'free-sort'}).last(1).values()[0];

                    if (last_trial) {
                        if (last_trial.accuracy == 1) {
                            return false; 
                        } else {
                            return true;  
                        }
                    }
                    return false; 
                }
            };
        }
        const practice_vw = repeatTillCorrectDragDrop(practice_sent);         

        let amb_shuffled = jsPsych.randomization.shuffle(amb);
        let unamb_shuffled = jsPsych.randomization.shuffle(unamb);

        let amb_pairs = amb_shuffled.map((s, i) => {
        let stroop = (i < 1) ? congruent() : incongruent();
        return [makeStroopTrial(stroop), ...makeVWBlock(s)]; 
        });
        let unamb_pairs = unamb_shuffled.map((s, i) => {
        let stroop = (i < 1) ? congruent() : incongruent();
        return [makeStroopTrial(stroop), ...makeVWBlock(s)];
        });
        let filler_trials = filler.map(s => makeVWBlock(s));



        let critical_trials = [].concat(amb_pairs, unamb_pairs);
        let mixed_pool = jsPsych.randomization.shuffle([].concat(filler_trials, extra_stroops));

        let all_experiment = [].concat(critical_trials, mixed_pool);
        


        let shuffled_experiment = jsPsych.randomization.shuffle(all_experiment);

        //Bilingual questionnaire
        let participant_type = null;  // "mono" veya "bi"
        let eligible = null;  
        var not_eligible = {
            type: jsPsychHtmlButtonResponse,
            stimulus: "<p>Thank you for your answers. Unfortunately, you are not eligible to take part in this study.</p>",
            choices: ["End"]
        };
        var q1_participant_type = {
            type: jsPsychSurveyMultiChoice,
            questions: [
                {
                prompt: "Which statement best describes you?", 
                name: 'participant_type', 
                options: ["I am an <b>English monolingual</b> (I only use English in my daily life).", "I am a <b>bilingual</b> (I regularly use English and another language)."], 
                required: true
                }, 
            ],
        
            on_finish: function(data) {
                var answer = data.response.participant_type;
                if (answer === "I am an <b>English monolingual</b> (I only use English in my daily life).") {participant_type = "mono";
                }

                if (answer === "I am a <b>bilingual</b> (I regularly use English and another language).") {participant_type = "bi";
                }
            }
        };
        var q2_monolingual = {
            type: jsPsychSurveyMultiChoice,
            questions: [
                {
                prompt: "Apart from English, do you understand or speak any other language?",
                name: 'mono_other_language',
                options: [
                    "No, I only speak English.",
                    "Yes, but only a few words or phrases.",
                    "Yes, I can understand and use another language in daily life."],
                required: true
                }
            ],
            on_finish: function(data) {
                var answer = data.response.mono_other_language;

                if (answer === "No, I only speak English." || answer === "Yes, but only a few words or phrases.") {eligible = true;
                } else {eligible = false;
                }
            }
        };
        var q2_bilingual = {
            type: jsPsychSurveyMultiChoice,
            questions: [
                { 
                prompt: "What is your first language (L1)?",
                name: "L1",
                options: ["Turkish", "Spanish", "Another language"],
                required: true
                },
                {
                prompt: "Are you fluent in English?",
                name: "L2",
                options: ["Yes", "No"],
                required: true
                }
            ],
            on_finish: function(data) {
                var L1 = data.response.L1;
                var L2 = data.response.L2;

                eligible = true;
                if (L1 === "Another language" || L2 === "No") {eligible = false;}
            }
        };
        var aoa_bilingual = {
            type: jsPsychSurveyText,
            questions: [
                {
                prompt: "At what age did you begin learning <b>English</b>?",
                name: "AoA",
                required: true
                }
            ],
            on_finish: function(data) {
                var AoA = data.response.AoA;
            }
        };
        var age = {
            type: jsPsychSurveyText,
            questions: [
                {
                prompt: "How old are you?",
                name: "age",
                required: true
                }
            ],
            on_finish: function(data) {
                var age = data.response.age;
            }
        };
        var likert_prof = [
            "Very Poor", 
            "Poor", 
            "Limited", 
            "Average", 
            "Good",
            "Very Good",
            "Excellent"
        ];
        var proficiency_L1 = {
            type: jsPsychSurveyLikert,
            preamble: "<p>Rate your current ability in terms of listening, reading, speaking and writing in your <b>FIRST language</b></p>",
            questions: [
                {prompt: "Listening in L1", name: "L1_listening", labels: likert_prof, required: true},
                {prompt: "Reading in L1", name: "L1_reading", labels: likert_prof, required: true},
                {prompt: "Speaking in L1", name: "L1_speaking", labels: likert_prof, required: true},
                {prompt: "Writing in L1", name: "L1_writing", labels: likert_prof, required: true}
            ],
            on_finish: function(data) {
                var L1_listening = data.response.L1_listening;
                var L1_reading = data.response.L1_reading;
                var L1_speaking = data.response.L1_speaking;
                var L1_writing = data.response.L1_writing;
            }
        }
        var proficiency_L2 = {
            type: jsPsychSurveyLikert,
            preamble: "<p>Rate your current ability in terms of listening, reading, speaking and writing in <b>ENGLISH</b></p>",
            questions: [
                {prompt: "Listening in English", name: "L2_listening", labels: likert_prof, required: true},
                {prompt: "Reading in English", name: "L2_reading", labels: likert_prof, required: true},
                {prompt: "Speaking in English", name: "L2_speaking", labels: likert_prof, required: true},
                {prompt: "Writing in English", name: "L2_writing", labels: likert_prof, required: true}
            ],
            on_finish: function(data) {
                var L2_listening = data.response.L2_listening;
                var L2_reading = data.response.L2_reading;
                var L2_speaking = data.response.L2_speaking;
                var L2_writing = data.response.L2_writing;
            }

        }
        var likert_freq = [
            "Never",
            "Rarely", 
            "Sometimes",
            "Regularly",
            "Often",
            "Usually", 
            "Always"
        ];
        var frequency = {
            type: jsPsychSurveyLikert,
            preamble: "<p><b>Rate how frequently you currently use each of the languages</b></p>",
            questions: [
                {prompt: "How often do you use English?", name: "eng_freq", labels: likert_freq, required: true},
                {prompt: "How often do you use your other language?", name: "oth_freq", labels: likert_freq, required: true}
            ],
            on_finish: function(data) {
                var eng_freq = data.response.eng_freq;
                var oth_freq = data.response.oth_freq;
            }
        }

        var timeline = [];
        timeline.push(preload);
        timeline.push(welcome, q1_participant_type);
        timeline.push({
            timeline:[q2_monolingual, age],
            conditional_function: function() {
                return participant_type === "mono";
            }
        });
        // 3) Q2_bi: if bilingual
        timeline.push({
            timeline: [age, q2_bilingual, aoa_bilingual, proficiency_L1, proficiency_L2, frequency],
            conditional_function: function() {
                return participant_type === "bi";
            }
        });

        // 4) Not eligible screen
        timeline.push({
            timeline: [not_eligible],
            conditional_function: function() {
                return eligible === false;
            }
        });

        // 5) Main experiment
        const experiment_body = {
            timeline: (function() {
                let temp_timeline = [eligible_text, calibration, validation, 
                calibration_done, instructions1, instructions2,
                practice_congruent1, practice_incongruent1, practice_congruent2, practice_incongruent2, 
                instructions3, practice_vw,
                start_experiment];
                
                // trials
                shuffled_experiment.forEach(trialset => {
                    temp_timeline.push(...trialset);
                });
                
                return temp_timeline;
            })(),
            conditional_function: function() {
                return eligible === true;
            }
        };
        timeline.push(experiment_body);
        const end_screen = {
            type: jsPsychHtmlButtonResponse,
            stimulus: "<p>Thank you for participating!</p><p>You may now close this window.</p>",
            choices: ["Finish"]
        };

        timeline.push(end_screen);
        jsPsych.run(timeline);
    </script>
